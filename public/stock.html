<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stock-A</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1419;
      color: #e7e9ea;
      min-height: 100vh;
      padding: 24px 16px;
    }
    .container { max-width: 960px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .subtitle { color: #71767b; font-size: 0.875rem; margin-bottom: 20px; }
    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    input {
      flex: 1;
      min-width: 200px;
      padding: 10px 12px;
      border: 1px solid #38444d;
      border-radius: 8px;
      background: #192734;
      color: #e7e9ea;
      font-size: 0.875rem;
    }
    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #1d9bf0;
      color: #fff;
      font-size: 0.875rem;
      cursor: pointer;
    }
    button:hover { background: #1a8cd8; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    button.secondary { background: #38444d; }
    button.secondary:hover { background: #4a5568; }
    .status { color: #71767b; font-size: 0.8125rem; margin-bottom: 12px; }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #192734;
      border-radius: 12px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 16px;
      text-align: left;
      border-bottom: 1px solid #38444d;
    }
    th { background: #22303c; color: #8899a6; font-weight: 500; font-size: 0.8125rem; }
    th.sortable { cursor: pointer; user-select: none; }
    th.sortable:hover { color: #e7e9ea; }
    tr:last-child td { border-bottom: none; }
    .error { color: #f4212e; padding: 16px; background: #192734; border-radius: 8px; }
    @media (max-width: 600px) {
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Stock-A</h1>
    <p class="subtitle">数据来源：新浪财经</p>

    <div class="toolbar">
      <input id="stockList" type="text" placeholder="股票代码，逗号分隔，如 sh000001,sz000001">
      <button id="refreshBtn" onclick="loadStocks()">刷新</button>
      <button class="secondary" onclick="loadMoreStocks()">查看更多</button>
    </div>
    <div class="status" id="status">加载中...</div>
    <div id="content"></div>
  </div>

  <script>
    const DEFAULT_LIST = 'sh000001,sh601127,sh603108,sh513100,sz000572,sh600418,sz000868,sz002271,sh600733,sz000980,sz000625,hkHSMPI';
    const FULL_LIST = 'sh000001,sh600702,sh603198,sz002567,sz001979,sz002466,sz000625,sh600418,sh601127,sh512710,sz002594,sz000002,sz000858,sh603108,sh600519,sh600111,sh600048,sh518880,sh588200,sh600733,sh515220,sh601001,sh600171,sh600030,sh600611,sh605108,sz002714,sz300059,sz002223,sz003040,sz002173,sz000596,sz000868,sz000980,sh603099,sh603199,sh513100,sh600036,sh600238,sh510880,sz300760,sz002123,sh603860,sz002607,sz001379,sz002186,sz000572,sh600754,sh603737,sz002271,sh516010,sh600016';

    let stockItems = [];
    let pcentSort = null;

    function cleanName(name) {
      if (!name) return '-';
      return name.replace(/^[^=]*="/, '').replace(/"$/, '').trim();
    }

    function parsePcent(pcent) {
      if (!pcent) return NaN;
      return parseFloat(String(pcent).replace('%', ''));
    }

    function sortIndicator() {
      if (pcentSort === 'asc') return ' ↑';
      if (pcentSort === 'desc') return ' ↓';
      return '';
    }

    function renderTable() {
      const content = document.getElementById('content');
      const items = [...stockItems];

      if (pcentSort) {
        const dir = pcentSort === 'asc' ? 1 : -1;
        items.sort((a, b) => {
          const av = parsePcent(a.pcent);
          const bv = parsePcent(b.pcent);
          if (isNaN(av) && isNaN(bv)) return 0;
          if (isNaN(av)) return 1;
          if (isNaN(bv)) return -1;
          return (av - bv) * dir;
        });
      }

      const rows = items.map(item => `
        <tr>
          <td>${cleanName(item.name)}</td>
          <td>${item.price ?? '-'}</td>
          <td>${item.pcent ?? '-'}</td>
          <td>${item.liang ?? '-'}</td>
        </tr>
      `).join('');

      content.innerHTML = `
        <table>
          <thead>
            <tr>
              <th>名称</th>
              <th>现价</th>
              <th class="sortable" onclick="togglePcentSort()">涨跌幅${sortIndicator()}</th>
              <th>成交量(亿)</th>
            </tr>
          </thead>
          <tbody>${rows || '<tr><td colspan="4">暂无数据</td></tr>'}</tbody>
        </table>
      `;
    }

    function togglePcentSort() {
      if (pcentSort === null) pcentSort = 'desc';
      else if (pcentSort === 'desc') pcentSort = 'asc';
      else pcentSort = null;
      renderTable();
    }

    function loadMoreStocks() {
      document.getElementById('stockList').value = FULL_LIST;
      loadStocks();
    }

    async function loadStocks() {
      const btn = document.getElementById('refreshBtn');
      const status = document.getElementById('status');
      const list = document.getElementById('stockList').value.trim() || DEFAULT_LIST;

      btn.disabled = true;
      status.textContent = '正在获取数据...';

      try {
        const res = await fetch('/stock?list=' + encodeURIComponent(list));
        if (!res.ok) throw new Error('请求失败: ' + res.status);
        const data = await res.json();

        stockItems = Object.values(data);
        renderTable();
        status.textContent = '更新时间: ' + new Date().toLocaleString('zh-CN');
      } catch (err) {
        stockItems = [];
        document.getElementById('content').innerHTML = '';
        status.innerHTML = '<span class="error">' + err.message + '</span>';
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById('stockList').value = DEFAULT_LIST;
    loadStocks();
  </script>
</body>
</html>
